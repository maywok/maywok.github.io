<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>masonwalker.tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="preload" href="./assets/fonts/Minecraft.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="./assets/fonts/RetroByte.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="./assets/fonts/Star%20Crush.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="./assets/fonts/trebuc.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="icon" href="./assets/images/logo.png" type="image/png" />
  <link rel="stylesheet" href="./styles.css?v=42" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
</head>
<body>
  <div id="startup-overlay" class="startup-overlay" aria-hidden="true">
    <video id="startup-video" class="startup-video" muted playsinline preload="auto" autoplay>
      <source src="./assets/video/ascII.mp4" type="video/mp4" />
    </video>
  </div>
  <div id="game-root" class="crt"></div>

  <script>
    (() => {
      const overlay = document.getElementById('startup-overlay');
      const video = document.getElementById('startup-video');
      if (!overlay || !video) {
        document.documentElement.classList.add('startup-ready');
        window.dispatchEvent(new Event('mw-start'));
        return;
      }

      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        overlay.classList.add('fade-out');
        window.setTimeout(() => overlay.remove(), 300);
        document.documentElement.classList.add('startup-ready');
        window.dispatchEvent(new Event('mw-start'));
      };

      const failSafe = window.setTimeout(finish, 2000);

      video.addEventListener('ended', () => {
        window.clearTimeout(failSafe);
        finish();
      });
      video.addEventListener('error', () => {
        window.clearTimeout(failSafe);
        finish();
      });
      video.addEventListener('stalled', () => {
        window.clearTimeout(failSafe);
        finish();
      });

      const tryPlay = () => {
        const p = video.play();
        if (p && typeof p.catch === 'function') {
          p.catch(() => {
            window.clearTimeout(failSafe);
            finish();
          });
        }
      };

      if (video.readyState >= 2) tryPlay();
      else video.addEventListener('canplay', tryPlay, { once: true });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && !done) {
          tryPlay();
        }
      });
    })();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.0/pixi.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module" src="./game.js?v=57"></script>
</body>
</html>
